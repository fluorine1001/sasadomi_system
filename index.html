<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASA 기숙사 시스템 통합 대시보드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏫 기숙사 통합 관리 서비스</h1>
        
        <div class="card card-login" id="loginForm">
            <h2>🔐 학생 계정 동기화 (최초 1회 필수)</h2>
            <div class="form-group-row">
                <input type="text" id="studentId" placeholder="아이디/학번">
                <input type="password" id="studentPw" placeholder="비밀번호">
            </div>
            <div style="margin-bottom: 15px; text-align: left; padding-left: 5px;">
                <label style="cursor: pointer; user-select: none; font-size: 14px; color: #555;">
                    <input type="checkbox" id="rememberMe" style="cursor: pointer; margin-right: 5px;"> 로그인 상태 유지
                </label>
            </div>
            <button onclick="syncAccount()">계정 인증 및 점수 불러오기</button>
        </div>

        <div id="dashboard" style="display:none;">
            <div class="score-container">
                <div class="score-box plus">상점 총점: <span id="rewardView">0</span>점</div>
                <div class="score-box minus">벌점 총점: <span id="penaltyView">0</span>점</div>
            </div>

            <div class="card">
                <h3>📋 상/벌점 세부 내역</h3>
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>구분</th>
                            <th>점수</th>
                            <th>가중치</th>
                            <th>사유</th>
                            <th>날짜</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" style="text-align:center;">상/벌점 내역이 없습니다.</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h3>📖 자율학습 신청 내역</h3>
                <table id="studyHistoryTable">
                    <thead>
                        <tr>
                            <th>취소</th>
                            <th>날짜</th>
                            <th>시간</th>
                            <th>장소</th>
                            <th>지도교사</th>
                            <th>비고</th>
                            <th>신청일</th>
                            <th>상태</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="8" style="text-align:center;">내역을 불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h3>🏃 외출·외박 신청 내역</h3>
                <table id="outHistoryTable">
                    <thead>
                        <tr>
                            <th>취소</th>
                            <th>구분</th>
                            <th>사유</th>
                            <th>나가는 일시</th>
                            <th>들어오는 일시</th>
                            <th>상태</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="6" style="text-align:center;">내역을 불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="action-buttons">
                <button class="btn-main" onclick="openModal('studyModal')">자율학습 등록</button>
                <button class="btn-main btn-out" onclick="openModal('outModal')">외출·외박 신청</button>
            </div>
            
            <button onclick="disconnectAccount()" style="background-color: #ff4d4f; color: white; margin-top: 15px; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                계정 연동 해제
            </button>
        </div>
    </div>

    <div id="studyModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('studyModal')">&times;</span>
            <h2>자율학습 등록</h2>
            <div class="modal-body">
                <label>날짜</label>
                <input type="date" id="studyDate">

                <div class="form-row">
                    <div>
                        <label>시간</label>
                        <select id="studyTime"></select>
                    </div>
                    <div>
                        <label>장소</label>
                        <select id="studyPlace" onchange="toggleStudyFields(this.value)"></select>
                    </div>
                </div>

                <p class="notice">본관 활동 신청은 18:00까지 가능합니다.</p>

                <div id="conditionalStudyFields" style="display: none;">
                    <label>본관 승인 지도교사를 선택하세요</label>
                    <select id="studyDetail"></select>

                    <label style="margin-top:15px;">본관 이용 장소와 사유를 입력하세요</label>
                    <textarea id="studyDetailReason" placeholder="이용 목적 및 구체적 사유 작성"></textarea>
                </div>

                <button class="btn-submit" onclick="submitStudy()">등록</button>
            </div>
        </div>
    </div>

    <div id="outModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('outModal')">&times;</span>
            <h2>외출·외박 신청</h2>
            <div class="modal-body">
                <label>구분</label>
                <select id="outType">
                    <option value="1">외출</option>
                    <option value="2">외박</option>
                </select>

                <label>나가는 일시</label>
                <div class="form-row">
                    <input type="date" id="outBdate">
                    <select id="outBtime"></select>
                </div>

                <label>들어오는 일시</label>
                <div class="form-row">
                    <input type="date" id="outEdate">
                    <select id="outEtime"></select>
                </div>

                <label>사유</label>
                <textarea id="outReason" placeholder="정확한 사유를 기술하세요."></textarea>

                <button class="btn-submit btn-out" onclick="submitOut()">신청</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
