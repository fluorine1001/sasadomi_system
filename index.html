<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASA 기숙사 시스템 통합 대시보드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏫 기숙사 통합 관리 서비스</h1>
        
        <div class="card card-login" id="loginForm">
            <h2>🔐 학생 계정 동기화 (최초 1회 필수)</h2>
            <div class="form-group-row">
                <input type="text" id="studentId" placeholder="아이디/학번">
                <input type="password" id="studentPw" placeholder="비밀번호">
            </div>
            <div style="margin-bottom: 15px; text-align: left; padding-left: 5px;">
                <label style="cursor: pointer; user-select: none; font-size: 14px; color: #555;">
                    <input type="checkbox" id="rememberMe" style="cursor: pointer; margin-right: 5px;"> 로그인 상태 유지
                </label>
            </div>
            <button onclick="syncAccount()">계정 인증 및 점수 불러오기</button>
        </div>

        <div id="dashboard" style="display:none;">
            <div class="score-container">
                <div class="score-box plus">상점 총점: <span id="rewardView">0</span>점</div>
                <div class="score-box minus">벌점 총점: <span id="penaltyView">0</span>점</div>
            </div>

            <div class="top-action-bar">
                <button class="btn-refresh" onclick="refreshData()">🔄 데이터 새로고침</button>
                <button class="btn-logout" onclick="logout()">로그아웃 (해제)</button>
            </div>

            <div class="card">
                <div class="flex-header">
                    <h2>📚 자율학습 신청 내역</h2>
                    <button class="btn-apply" onclick="openModal('studyModal')">새로 신청하기</button>
                </div>
                <div class="table-responsive">
                    <table class="data-table" id="studyHistoryTable">
                        <thead>
                            <tr>
                                <th>번호</th>
                                <th>날짜</th>
                                <th>교시</th>
                                <th>장소</th>
                                <th>지도교사</th>
                                <th>상세내용</th>
                                <th>신청일</th>
                                <th>상태</th>
                                <th>취소</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="flex-header">
                    <h2>🚶 외출·외박 신청 내역</h2>
                    <button class="btn-apply btn-out" onclick="openModal('outModal')">새로 신청하기</button>
                </div>
                <div class="table-responsive">
                    <table class="data-table" id="outHistoryTable">
                        <thead>
                            <tr>
                                <th>번호</th>
                                <th>구분</th>
                                <th>나가는 일시</th>
                                <th>들어오는 일시</th>
                                <th>사유</th>
                                <th>신청일</th>
                                <th>상태</th>
                                <th>취소</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="card score-details-card">
                <h2>📈 상벌점 상세 내역</h2>
                <div class="score-tables-wrapper">
                    <div class="score-table-container">
                        <h3 class="plus-text">상점 부여 기록</h3>
                        <table class="data-table" id="rewardTable">
                            <thead>
                                <tr>
                                    <th>날짜</th>
                                    <th>항목 (사유)</th>
                                    <th>점수</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    
                    <div class="score-table-container">
                        <h3 class="minus-text">벌점 부여 기록</h3>
                        <table class="data-table" id="penaltyTable">
                            <thead>
                                <tr>
                                    <th>날짜</th>
                                    <th>항목 (사유)</th>
                                    <th>점수</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="studyModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('studyModal')">&times;</span>
            <h2>자율학습 신청</h2>
            <div class="modal-body">
                <label>날짜</label>
                <input type="date" id="studyDate">
                
                <label>교시</label>
                <select id="studyTime"></select>

                <label>장소</label>
                <select id="studyPlace"></select>

                <div id="studyDetailGroup">
                    <label>지도 교사 (필수 기재)</label>
                    <select id="studyDetail"></select>

                    <label style="margin-top:15px;">본관 이용 장소와 사유를 입력하세요</label>
                    <textarea id="studyDetailReason" placeholder="이용 목적 및 구체적 사유 작성"></textarea>
                </div>

                <button class="btn-submit" onclick="submitStudy()">등록</button>
            </div>
        </div>
    </div>

    <div id="outModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('outModal')">&times;</span>
            <h2>외출·외박 신청</h2>
            <div class="modal-body">
                <label>구분</label>
                <select id="outType">
                    <option value="1">외출</option>
                    <option value="2">외박</option>
                </select>

                <label>나가는 일시</label>
                <div class="form-row">
                    <input type="date" id="outBdate">
                    <select id="outBtime"></select>
                </div>

                <label>들어오는 일시</label>
                <div class="form-row">
                    <input type="date" id="outEdate">
                    <select id="outEtime"></select>
                </div>

                <label>사유</label>
                <textarea id="outReason" placeholder="정확한 사유를 기술하세요."></textarea>

                <button class="btn-submit btn-out" onclick="submitOut()">신청</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
