<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASA 기숙사 시스템 통합 대시보드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏫 기숙사 통합 관리 서비스</h1>
        
        <div class="card card-login" id="loginForm">
            <h2>🔐 학생 계정 동기화 (최초 1회 필수)</h2>
            <div class="form-group-row">
                <input type="text" id="studentId" placeholder="아이디/학번 (예: s2026030601)">
                <input type="password" id="studentPw" placeholder="비밀번호">
            </div>
            <div style="margin-bottom: 15px; text-align: left; padding-left: 5px;">
                <label style="cursor: pointer; user-select: none; font-size: 14px; color: #555;">
                    <input type="checkbox" id="rememberMe" style="cursor: pointer; margin-right: 5px;"> 로그인 상태 유지
                </label>
            </div>
            <button onclick="syncAccount()">계정 인증 및 점수 불러오기</button>
        </div>

        <div id="dashboard" style="display:none;">
            <div class="score-container">
                <div class="score-box plus">상점 총점: <span id="rewardView">0</span>점</div>
                <div class="score-box minus">벌점 총점: <span id="penaltyView">0</span>점</div>
            </div>

            <div class="card">
                <h3>📋 상/벌점 세부 내역</h3>
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>구분</th>
                            <th>점수</th>
                            <th>가중치</th>
                            <th>사유</th>
                            <th>날짜</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" style="text-align:center;">상/벌점 내역이 없습니다.</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h3>📖 자율학습 신청 내역</h3>
                <table id="studyHistoryTable">
                    <thead>
                        <tr>
                            <th>날짜</th>
                            <th>시간</th>
                            <th>장소</th>
                            <th>세부/사유</th>
                            <th>상태</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" style="text-align:center;">내역을 불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h3>🏃 외출·외박 신청 내역</h3>
                <table id="outHistoryTable">
                    <thead>
                        <tr>
                            <th>구분</th>
                            <th>사유</th>
                            <th>나가는 일시</th>
                            <th>들어오는 일시</th>
                            <th>상태</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" style="text-align:center;">내역을 불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="action-buttons">
                <button class="btn-main" onclick="openModal('studyModal')">자율학습 등록</button>
                <button class="btn-main btn-out" onclick="openModal('outModal')">외출·외박 신청</button>
            </div>
            
            <button onclick="disconnectAccount()" style="background-color: #ff4d4f; color: white; margin-top: 15px; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                계정 연동 해제
            </button>
        </div>
    </div>

    <div id="studyModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('studyModal')">&times;</span>
            <h2>자율학습 등록</h2>
            <div class="modal-body">
                <label>날짜</label>
                <input type="date" id="studyDate">

                <div class="form-row">
                    <div>
                        <label>시간</label>
                        <select id="studyTime">
                            <option value="1">오전</option>
                            <option value="2">오후</option>
                            <option value="3">학습 I</option>
                            <option value="4">학습 II</option>
                            <option value="5">연장 학습(00~01시)</option>
                            <option value="6">연장 학습(01~02시)</option>
                        </select>
                    </div>
                    <div>
                        <label>장소</label>
                        <select id="studyPlace" onchange="toggleStudyFields(this.value)">
                            <option value="1">호실(요양)-주간 평일 3회</option>
                            <option value="2">휴게실</option>
                            <option value="3">본관</option>
                            <option value="4">정독실</option>
                            <option value="5">세미나공간</option>
                            <option value="6">3층 스터디룸</option>
                            <option value="7">소학습실(1층)</option>
                            <option value="8">소학습실(2층)</option>
                            <option value="9">소학습실(3층)</option>
                            <option value="10">소학습실(4층)</option>
                            <option value="11">소학습실(5층)</option>
                        </select>
                    </div>
                </div>

                <p class="notice">본관 활동 신청은 18:00까지 가능합니다.</p>

                <div id="conditionalStudyFields" style="display: none;">
                    <label>본관 승인 지도교사를 선택하세요</label>
                    <select id="studyDetail">
                        <option value="강계화">강계화</option>
                        <option value="고민지">고민지</option>
                        <option value="고유선">고유선</option>
                        <option value="고준태">고준태</option>
                        <option value="곽승철">곽승철</option>
                        <option value="구금주">구금주</option>
                        <option value="구대환">구대환</option>
                        <option value="길승호">길승호</option>
                        <option value="김기향">김기향</option>
                        <option value="김대중">김대중</option>
                        <option value="김명희">김명희</option>
                        <option value="김문태">김문태</option>
                        <option value="김미리">김미리</option>
                        <option value="김백진">김백진</option>
                        <option value="김선아">김선아</option>
                        <option value="김수미">김수미</option>
                        <option value="김승진">김승진</option>
                        <option value="김승현">김승현</option>
                        <option value="김승환">김승환</option>
                        <option value="김예은">김예은</option>
                        <option value="김정화">김정화</option>
                        <option value="김종헌">김종헌</option>
                        <option value="김지현">김지현</option>
                        <option value="김지혜">김지혜</option>
                        <option value="김현철">김현철</option>
                        <option value="김희수">김희수</option>
                        <option value="남민경">남민경</option>
                        <option value="문재은">문재은</option>
                        <option value="박고운">박고운</option>
                        <option value="박순">박순</option>
                        <option value="박연순">박연순</option>
                        <option value="박은영">박은영</option>
                        <option value="손창환">손창환</option>
                        <option value="신현정">신현정</option>
                        <option value="안정수">안정수</option>
                        <option value="양영규">양영규</option>
                        <option value="유연정">유연정</option>
                        <option value="이경민">이경민</option>
                        <option value="이경진">이경진</option>
                        <option value="이동천">이동천</option>
                        <option value="이민호">이민호</option>
                        <option value="이산">이산</option>
                        <option value="이상숙">이상숙</option>
                        <option value="이성현">이성현</option>
                        <option value="이승현">이승현</option>
                        <option value="이예찬">이예찬</option>
                        <option value="이제림">이제림</option>
                        <option value="이주미">이주미</option>
                        <option value="이지은">이지은</option>
                        <option value="이현아">이현아</option>
                        <option value="이효빈">이효빈</option>
                        <option value="임건웅">임건웅</option>
                        <option value="장혜민">장혜민</option>
                        <option value="전윤미">전윤미</option>
                        <option value="전재성">전재성</option>
                        <option value="정세영">정세영</option>
                        <option value="조승훈">조승훈</option>
                        <option value="조현주">조현주</option>
                        <option value="주지웅">주지웅</option>
                        <option value="진대성">진대성</option>
                        <option value="진소영">진소영</option>
                        <option value="한지선">한지선</option>
                        <option value="홍주환">홍주환</option>
                        <option value="휴일도서관">휴일도서관</option>
                    </select>

                    <label style="margin-top:15px;">본관 이용 장소와 사유를 입력하세요</label>
                    <textarea id="studyDetailReason" placeholder="이용 목적 및 구체적 사유 작성"></textarea>
                </div>

                <button class="btn-submit" onclick="submitStudy()">등록</button>
            </div>
        </div>
    </div>

    <div id="outModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('outModal')">&times;</span>
            <h2>외출·외박 신청</h2>
            <div class="modal-body">
                <label>구분</label>
                <select id="outType">
                    <option value="1">외출</option>
                    <option value="2">외박</option>
                </select>

                <label>나가는 일시</label>
                <div class="form-row">
                    <input type="date" id="outBdate">
                    <select id="outBtime">
                        <option value="00:00">00:00</option><option value="01:00">01:00</option>
                        <option value="02:00">02:00</option><option value="03:00">03:00</option>
                        <option value="04:00">04:00</option><option value="05:00">05:00</option>
                        <option value="06:00">06:00</option><option value="07:00">07:00</option>
                        <option value="08:00">08:00</option><option value="09:00">09:00</option>
                        <option value="10:00">10:00</option><option value="11:00">11:00</option>
                        <option value="12:00">12:00</option><option value="13:00">13:00</option>
                        <option value="14:00">14:00</option><option value="15:00">15:00</option>
                        <option value="16:00">16:00</option><option value="17:00">17:00</option>
                        <option value="18:00">18:00</option><option value="19:00">19:00</option>
                        <option value="20:00">20:00</option><option value="21:00">21:00</option>
                        <option value="22:00">22:00</option><option value="23:00">23:00</option>
                    </select>
                </div>

                <label>들어오는 일시</label>
                <div class="form-row">
                    <input type="date" id="outEdate">
                    <select id="outEtime">
                        <option value="00:00">00:00</option><option value="01:00">01:00</option>
                        <option value="02:00">02:00</option><option value="03:00">03:00</option>
                        <option value="04:00">04:00</option><option value="05:00">05:00</option>
                        <option value="06:00">06:00</option><option value="07:00">07:00</option>
                        <option value="08:00">08:00</option><option value="09:00">09:00</option>
                        <option value="10:00">10:00</option><option value="11:00">11:00</option>
                        <option value="12:00">12:00</option><option value="13:00">13:00</option>
                        <option value="14:00">14:00</option><option value="15:00">15:00</option>
                        <option value="16:00">16:00</option><option value="17:00">17:00</option>
                        <option value="18:00">18:00</option><option value="19:00">19:00</option>
                        <option value="20:00">20:00</option><option value="21:00">21:00</option>
                        <option value="22:00">22:00</option><option value="23:00">23:00</option>
                    </select>
                </div>

                <label>사유</label>
                <textarea id="outReason" placeholder="정확한 사유를 기술하세요."></textarea>

                <button class="btn-submit btn-out" onclick="submitOut()">신청</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
